name: MeetMind
options:
  bundleIdPrefix: com.meetmind
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  FirebaseAuth:
    url: "https://github.com/firebase/firebase-ios-sdk"
    from: "11.0.0"
  GoogleSignIn:
    url: "https://github.com/google/GoogleSignIn-iOS"
    from: "8.0.0"

targets:
  MeetMind:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MeetMind
        excludes:
          - "**/*.xcassets"
          - "Resources/Info.plist"
          - "Resources/GoogleService-Info.plist"
    resources:
      - path: MeetMind/Resources/GoogleService-Info.plist
    dependencies:
      - package: FirebaseAuth
        product: FirebaseAuth
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.meetmind.app
        INFOPLIST_FILE: MeetMind/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        SWIFT_EMIT_LOC_STRINGS: true

schemes:
  MeetMind:
    build:
      targets:
        MeetMind: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
