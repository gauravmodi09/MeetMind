<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetMind Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6C5CE7;
            --purple-light: #ede9fe;
            --purple-dark: #5A4BD6;
            --purple-glow: rgba(108, 92, 231, 0.08);
            --red: #FF4757;
            --red-light: #fef2f2;
            --green: #00CE9E;
            --green-light: #f0fdf4;
            --amber: #FFA502;
            --amber-light: #fef3c7;
            --blue: #2D98FF;
            --blue-light: #eff6ff;
            --gray-50: #f8f7fc;
            --gray-100: #f1f0f7;
            --gray-200: #e2e0ef;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-800: #1a2332;
            --gray-900: #0f172a;
            --card-shadow: 0 1px 2px rgba(0,0,0,0.04);
            --card-shadow-hover: 0 4px 16px rgba(0,0,0,0.08);
            --radius: 8px;
            --radius-lg: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ── */
        .header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 10px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            background: linear-gradient(135deg, #6C5CE7, #a78bfa);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 15px;
            line-height: 1;
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.3);
        }
        .logo-text {
            font-weight: 700;
            font-size: 17px;
            color: var(--gray-800);
            letter-spacing: -0.3px;
        }
        .logo-sub {
            font-weight: 400;
            color: var(--gray-400);
        }
        .header-actions { display: flex; gap: 6px; }

        /* ── Quick Add Bar ── */
        .quick-add-bar {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 10px 24px;
        }
        .quick-add-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .quick-add-input {
            flex: 1;
            min-width: 180px;
            background: var(--gray-100);
            border-radius: var(--radius);
            padding: 9px 14px;
            font-size: 13px;
            font-family: inherit;
            border: 1.5px solid transparent;
            outline: none;
            transition: all 0.15s;
            color: var(--gray-800);
        }
        .quick-add-input::placeholder { color: var(--gray-400); }
        .quick-add-input:focus {
            border-color: var(--purple);
            background: white;
            box-shadow: 0 0 0 3px var(--purple-glow);
        }
        .filter-chips { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        .filter-chip {
            padding: 5px 11px;
            border-radius: 16px;
            border: 1px solid var(--gray-200);
            background: white;
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--gray-500);
        }
        .filter-chip:hover { border-color: var(--purple); color: var(--purple); }
        .filter-chip.active {
            background: var(--purple-light);
            border-color: var(--purple-light);
            color: var(--purple);
            font-weight: 600;
        }
        .search-input {
            width: 130px;
            padding: 5px 10px;
            border-radius: 16px;
            border: 1px solid var(--gray-200);
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: all 0.15s;
            color: var(--gray-800);
        }
        .search-input::placeholder { color: var(--gray-400); }
        .search-input:focus { border-color: var(--purple); width: 180px; }

        /* ── Stats Row ── */
        .stats-row {
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 24px;
            display: flex;
            gap: 18px;
            align-items: center;
            font-size: 12px;
            color: var(--gray-400);
        }
        .stats-row strong {
            font-size: 15px;
            font-weight: 700;
            color: var(--gray-800);
        }
        .progress-track {
            display: inline-block;
            width: 80px;
            height: 4px;
            background: var(--gray-200);
            border-radius: 2px;
            overflow: hidden;
            vertical-align: middle;
        }
        .progress-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--purple), var(--green));
            transition: width 0.5s ease;
        }

        /* ── Board ── */
        .board {
            max-width: 1400px;
            margin: 0 auto;
            padding: 8px 24px 24px;
            display: flex;
            gap: 12px;
            overflow-x: auto;
        }
        .column {
            flex: 1;
            min-width: 280px;
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 200px);
        }
        .column.col-done { background: var(--green-light); }
        .column-header {
            padding: 10px 12px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
            letter-spacing: 0.2px;
        }
        .column-header .count {
            border-radius: 10px;
            padding: 1px 7px;
            font-size: 11px;
            font-weight: 600;
        }
        .column-body {
            padding: 6px 8px 8px;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .column-body.drag-over { background: var(--purple-glow); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }

        /* ── Task Card ── */
        .task-card {
            background: white;
            border-radius: var(--radius);
            padding: 10px 12px;
            box-shadow: var(--card-shadow);
            cursor: grab;
            transition: box-shadow 0.15s, transform 0.15s;
            border-left: 3px solid transparent;
        }
        .task-card:hover {
            box-shadow: var(--card-shadow-hover);
            transform: translateY(-1px);
        }
        .task-card.dragging { opacity: 0.5; transform: rotate(2deg); }
        .task-card.priority-critical { border-left-color: var(--red); }
        .task-card.priority-high { border-left-color: var(--amber); }
        .task-card.priority-medium { border-left-color: var(--purple); }
        .task-card.priority-low { border-left-color: var(--gray-300); }
        .col-done .task-card { opacity: 0.75; }
        .col-done .task-card:hover { opacity: 1; }

        .task-title {
            font-weight: 600;
            font-size: 13px;
            line-height: 1.35;
            color: var(--gray-800);
        }
        .task-description {
            font-size: 11px;
            color: var(--gray-500);
            margin-top: 3px;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .task-meta {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 7px;
        }
        .tag {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 6px;
            font-weight: 500;
            letter-spacing: 0.1px;
        }
        .tag-feature { background: var(--purple-light); color: var(--purple); }
        .tag-bug { background: var(--red-light); color: var(--red); }
        .tag-infra { background: var(--blue-light); color: var(--blue); }
        .tag-design { background: var(--amber-light); color: var(--amber); }
        .tag-priority-critical { background: var(--red-light); color: var(--red); }
        .tag-priority-high { background: var(--amber-light); color: var(--amber); }
        .task-note-count { font-size: 10px; color: var(--gray-400); margin-left: auto; }

        /* ── Buttons ── */
        .btn {
            padding: 6px 13px;
            border-radius: 7px;
            border: none;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-primary { background: var(--purple); color: white; }
        .btn-primary:hover { background: var(--purple-dark); }
        .btn-secondary {
            background: white;
            color: var(--gray-500);
            border: 1px solid var(--gray-200);
        }
        .btn-secondary:hover { border-color: var(--purple); color: var(--purple); }
        .btn-add-task {
            width: 100%;
            padding: 7px;
            border: 1.5px dashed var(--gray-200);
            border-radius: 7px;
            background: transparent;
            color: var(--gray-400);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-add-task:hover {
            border-color: var(--purple);
            color: var(--purple);
            background: var(--purple-glow);
        }

        /* ── Slide-over Panel ── */
        .panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(2px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .panel-overlay.active { opacity: 1; pointer-events: all; }
        .panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 420px;
            max-width: 92vw;
            background: white;
            box-shadow: -8px 0 30px rgba(0,0,0,0.1);
            border-left: 3px solid var(--purple);
            transform: translateX(100%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding: 24px;
            z-index: 201;
            display: flex;
            flex-direction: column;
        }
        .panel-overlay.active .panel { transform: translateX(0); }
        .panel-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            font-size: 18px;
            color: var(--gray-400);
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .panel-close:hover { background: var(--gray-100); color: var(--gray-800); }
        .panel-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 10px;
            padding-right: 32px;
            outline: none;
            line-height: 1.35;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.15s;
        }
        .panel-title:focus { border-bottom-color: var(--purple); }
        .panel-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 16px; }
        .panel-field { margin-bottom: 14px; }
        .panel-field label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--gray-400);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
        }
        .panel-field select,
        .panel-field textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1.5px solid var(--gray-200);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            color: var(--gray-800);
            background: white;
        }
        .panel-field select:focus,
        .panel-field textarea:focus { border-color: var(--purple); }
        .panel-field textarea { resize: vertical; min-height: 60px; }
        .panel-divider { height: 1px; background: var(--gray-200); margin: 4px 0 16px; }
        .panel-notes-header {
            font-size: 12px;
            font-weight: 600;
            color: var(--gray-600);
            margin-bottom: 10px;
        }
        .panel-notes-header span { color: var(--gray-400); font-weight: 400; }
        .note-item {
            background: var(--gray-50);
            border-radius: 7px;
            padding: 9px 11px;
            margin-bottom: 6px;
            line-height: 1.45;
        }
        .note-date {
            font-size: 10px;
            font-weight: 600;
            color: var(--purple);
            margin-right: 3px;
        }
        .note-text { font-size: 12px; color: var(--gray-600); }
        .note-input {
            width: 100%;
            padding: 9px 11px;
            background: var(--gray-100);
            border-radius: 7px;
            border: 1.5px solid transparent;
            font-size: 12px;
            font-family: inherit;
            outline: none;
            transition: all 0.15s;
            color: var(--gray-800);
            margin-top: 2px;
        }
        .note-input::placeholder { color: var(--gray-400); }
        .note-input:focus { border-color: var(--purple); background: white; }
        .panel-delete {
            margin-top: auto;
            padding-top: 20px;
        }
        .panel-delete button {
            width: 100%;
            padding: 8px;
            border-radius: 7px;
            border: 1px solid var(--red-light);
            background: white;
            color: var(--red);
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.15s;
        }
        .panel-delete button:hover { background: var(--red-light); }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.25);
            backdrop-filter: blur(2px);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 440px;
            max-width: 92vw;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transform: translateY(16px);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal { transform: translateY(0); }
        .modal h2 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 18px;
            color: var(--gray-800);
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--gray-400);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 11px;
            border: 1.5px solid var(--gray-200);
            border-radius: 7px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            color: var(--gray-800);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { border-color: var(--purple); }
        .form-group textarea { resize: vertical; min-height: 56px; }
        .form-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 18px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .board { flex-direction: column; }
            .column { min-width: auto; max-height: none; }
            .quick-add-inner { flex-direction: column; }
            .filter-chips { flex-wrap: wrap; }
            .search-input:focus { width: 130px; }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-inner">
        <div class="logo">
            <div class="logo-icon">&#129504;</div>
            <span class="logo-text">MeetMind <span class="logo-sub">Tracker</span></span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="saveStatus" onclick="connectAndSave()">Connect File</button>
            <button class="btn btn-secondary" onclick="exportData()">Export</button>
            <button class="btn btn-secondary" onclick="importData()">Import</button>
        </div>
    </div>
</div>

<!-- Quick Add Bar -->
<div class="quick-add-bar">
    <div class="quick-add-inner">
        <input type="text" class="quick-add-input" id="quickAddInput"
               placeholder="Quick add — type a task and press Enter..."
               onkeydown="if(event.key==='Enter')quickAdd()">
        <div class="filter-chips">
            <button class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
            <button class="filter-chip" data-filter="feature" onclick="setFilter('feature',this)">Features</button>
            <button class="filter-chip" data-filter="infra" onclick="setFilter('infra',this)">Infra</button>
            <button class="filter-chip" data-filter="design" onclick="setFilter('design',this)">Design</button>
            <button class="filter-chip" data-filter="bug" onclick="setFilter('bug',this)">Bug</button>
            <input type="text" class="search-input" placeholder="Search..." oninput="searchTasks(this.value)">
        </div>
    </div>
</div>

<!-- Stats Row -->
<div class="stats-row" id="statsRow"></div>

<!-- Kanban Board -->
<div class="board" id="board"></div>

<!-- Slide-over Detail Panel -->
<div class="panel-overlay" id="panelOverlay" onclick="if(event.target===this)closePanel()">
    <div class="panel" id="panel">
        <button class="panel-close" onclick="closePanel()">&times;</button>
        <div class="panel-title" id="panelTitle" contenteditable="true"
             onblur="updatePanelField('title',this.textContent.trim())"></div>
        <div class="panel-tags" id="panelTags"></div>

        <div class="panel-field">
            <label>Status</label>
            <select id="panelStatus" onchange="updatePanelField('status',this.value)">
                <option value="backlog">Backlog</option>
                <option value="todo">To Do</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
            </select>
        </div>

        <div class="panel-field">
            <label>Description</label>
            <textarea id="panelDesc" placeholder="Add description..."
                      onblur="updatePanelField('desc',this.value)"></textarea>
        </div>

        <div style="display:flex;gap:8px">
            <div class="panel-field" style="flex:1">
                <label>Category</label>
                <select id="panelCategory" onchange="updatePanelField('category',this.value)">
                    <option value="feature">Feature</option>
                    <option value="bug">Bug</option>
                    <option value="infra">Infra</option>
                    <option value="design">Design</option>
                </select>
            </div>
            <div class="panel-field" style="flex:1">
                <label>Priority</label>
                <select id="panelPriority" onchange="updatePanelField('priority',this.value)">
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </div>

        <div class="panel-divider"></div>

        <div class="panel-notes-header">Notes <span id="panelNoteCount"></span></div>
        <div id="panelNotes"></div>
        <input type="text" class="note-input" id="noteInput" placeholder="Add a note..."
               onkeydown="if(event.key==='Enter')addNote()">

        <div class="panel-delete">
            <button onclick="deletePanelTask()">Delete Task</button>
        </div>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h2 id="modalTitle">Add Task</h2>
        <input type="hidden" id="editTaskId">
        <div class="form-group">
            <label>Title</label>
            <input type="text" id="taskTitle" placeholder="What needs to be done?">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="taskDesc" placeholder="Details, context..."></textarea>
        </div>
        <div style="display:flex;gap:12px">
            <div class="form-group" style="flex:1">
                <label>Category</label>
                <select id="taskCategory">
                    <option value="feature">Feature</option>
                    <option value="bug">Bug</option>
                    <option value="infra">Infra</option>
                    <option value="design">Design</option>
                </select>
            </div>
            <div class="form-group" style="flex:1">
                <label>Priority</label>
                <select id="taskPriority">
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                    <option value="critical">Critical</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="taskStatus">
                <option value="backlog">Backlog</option>
                <option value="todo">To Do</option>
                <option value="in-progress">In Progress</option>
                <option value="done">Done</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
        </div>
    </div>
</div>

<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ── Constants ──
const COLUMNS = [
    { id: 'backlog', title: 'Backlog', color: 'var(--gray-500)', countBg: 'var(--gray-100)', countColor: 'var(--gray-500)' },
    { id: 'todo', title: 'To Do', color: 'var(--purple)', countBg: 'var(--purple-light)', countColor: 'var(--purple)' },
    { id: 'in-progress', title: 'In Progress', color: 'var(--amber)', countBg: 'var(--amber-light)', countColor: '#92400e' },
    { id: 'done', title: 'Done', color: 'var(--green)', countBg: 'var(--green-light)', countColor: '#16a34a' }
];

// ── State ──
let tasks = [];
let currentFilter = 'all';
let searchQuery = '';
let draggedTask = null;
let activePanelTaskId = null;
let fileHandle = null;

// ── Persistence ──
async function loadTasks() {
    // Priority: localStorage first (preserves user edits), then tasks.json as fallback
    const saved = localStorage.getItem('meetmind_tracker_tasks');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed) && parsed.length > 0) {
                tasks = parsed;
                render();
                return;
            }
        } catch (e) { /* corrupted localStorage, fall through */ }
    }

    // No localStorage data — load from tasks.json (first launch)
    try {
        const resp = await fetch('./tasks.json?t=' + Date.now());
        if (resp.ok) {
            const data = await resp.json();
            if (Array.isArray(data) && data.length > 0) {
                tasks = data;
                localStorage.setItem('meetmind_tracker_tasks', JSON.stringify(tasks));
                render();
                return;
            }
        }
    } catch (e) { /* fall through */ }

    tasks = [];
    render();
}

async function saveTasks() {
    localStorage.setItem('meetmind_tracker_tasks', JSON.stringify(tasks));
    if (fileHandle) {
        try {
            const writable = await fileHandle.createWritable();
            await writable.write(JSON.stringify(tasks, null, 2));
            await writable.close();
            updateSaveButton('saved');
        } catch (e) {
            console.warn('Could not write to file:', e);
            updateSaveButton('error');
        }
    } else {
        updateSaveButton('disconnected');
    }
}

async function connectAndSave() {
    try {
        if (!window.showOpenFilePicker) {
            alert('Your browser does not support direct file saving.\n\nUse Chrome or Edge, then click this button to connect to tasks.json.\n\nAlternatively, use Export to manually save.');
            return;
        }
        const [handle] = await window.showOpenFilePicker({
            types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
            multiple: false
        });
        fileHandle = handle;
        const writable = await fileHandle.createWritable();
        await writable.write(JSON.stringify(tasks, null, 2));
        await writable.close();
        updateSaveButton('saved');
    } catch (e) {
        if (e.name !== 'AbortError') console.error('File connect error:', e);
    }
}

function updateSaveButton(state) {
    const btn = document.getElementById('saveStatus');
    if (state === 'saved') {
        btn.textContent = 'Saved';
        btn.style.borderColor = 'var(--green)';
        btn.style.color = 'var(--green)';
        setTimeout(function() {
            btn.textContent = 'Auto-Saving';
            btn.style.borderColor = 'var(--green)';
            btn.style.color = 'var(--green)';
        }, 1500);
    } else if (state === 'error') {
        btn.textContent = 'Save Failed';
        btn.style.borderColor = 'var(--red)';
        btn.style.color = 'var(--red)';
    } else {
        btn.textContent = 'Connect File';
        btn.style.borderColor = '';
        btn.style.color = '';
    }
}

function g() { return Math.random().toString(36).substr(2, 9); }

function esc(str) {
    var d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// ── Render ──
function render() {
    renderStats();
    renderBoard();
}

function renderStats() {
    var total = tasks.length;
    var done = tasks.filter(function(t) { return t.status === 'done'; }).length;
    var inProg = tasks.filter(function(t) { return t.status === 'in-progress'; }).length;
    var todo = tasks.filter(function(t) { return t.status === 'todo'; }).length;
    var pct = total ? Math.round((done / total) * 100) : 0;

    var statsEl = document.getElementById('statsRow');
    statsEl.textContent = '';

    var s1 = document.createElement('span');
    s1.innerHTML = '<strong>' + total + '</strong> total';
    statsEl.appendChild(s1);

    var s2 = document.createElement('span');
    s2.innerHTML = '<strong style="color:var(--purple)">' + todo + '</strong> to do';
    statsEl.appendChild(s2);

    var s3 = document.createElement('span');
    s3.innerHTML = '<strong style="color:var(--amber)">' + inProg + '</strong> in progress';
    statsEl.appendChild(s3);

    var s4 = document.createElement('span');
    s4.innerHTML = '<strong style="color:var(--green)">' + done + '</strong> done';
    statsEl.appendChild(s4);

    var s5 = document.createElement('span');
    s5.style.cssText = 'margin-left:auto;display:flex;align-items:center;gap:6px;';
    var track = document.createElement('span');
    track.className = 'progress-track';
    var fill = document.createElement('span');
    fill.className = 'progress-fill';
    fill.style.width = pct + '%';
    track.appendChild(fill);
    s5.appendChild(track);
    var pctLabel = document.createElement('strong');
    pctLabel.style.fontSize = '12px';
    pctLabel.textContent = pct + '%';
    s5.appendChild(pctLabel);
    statsEl.appendChild(s5);
}

function renderBoard() {
    var board = document.getElementById('board');
    board.textContent = '';

    COLUMNS.forEach(function(col) {
        var colTasks = tasks.filter(function(t) { return t.status === col.id; });
        if (currentFilter !== 'all') colTasks = colTasks.filter(function(t) { return t.category === currentFilter; });
        if (searchQuery) {
            var q = searchQuery.toLowerCase();
            colTasks = colTasks.filter(function(t) {
                return t.title.toLowerCase().includes(q) ||
                    (t.desc && t.desc.toLowerCase().includes(q));
            });
        }

        var colEl = document.createElement('div');
        colEl.className = 'column' + (col.id === 'done' ? ' col-done' : '');

        // Column header
        var header = document.createElement('div');
        header.className = 'column-header';
        header.style.color = col.color;
        var titleSpan = document.createElement('span');
        titleSpan.textContent = col.title;
        header.appendChild(titleSpan);
        var countSpan = document.createElement('span');
        countSpan.className = 'count';
        countSpan.style.background = col.countBg;
        countSpan.style.color = col.countColor;
        countSpan.textContent = colTasks.length;
        header.appendChild(countSpan);
        colEl.appendChild(header);

        // Column body
        var body = document.createElement('div');
        body.className = 'column-body';
        body.dataset.status = col.id;
        body.addEventListener('dragover', handleDragOver);
        body.addEventListener('dragenter', handleDragEnter);
        body.addEventListener('dragleave', handleDragLeave);
        (function(status) {
            body.addEventListener('drop', function(e) { handleDrop(e, status); });
        })(col.id);

        colTasks.forEach(function(task) {
            var card = buildTaskCard(task);
            body.appendChild(card);
        });

        // Add task button
        var addBtn = document.createElement('button');
        addBtn.className = 'btn-add-task';
        addBtn.textContent = '+ Add task';
        (function(status) {
            addBtn.addEventListener('click', function() { openModal(status); });
        })(col.id);
        body.appendChild(addBtn);

        colEl.appendChild(body);
        board.appendChild(colEl);
    });
}

function buildTaskCard(task) {
    var card = document.createElement('div');
    card.className = 'task-card priority-' + task.priority;
    card.draggable = true;
    card.id = 'task-' + task.id;

    card.addEventListener('dragstart', function(e) { handleDragStart(e, task.id); });
    card.addEventListener('dragend', handleDragEnd);
    card.addEventListener('click', function() { openPanel(task.id); });

    var titleDiv = document.createElement('div');
    titleDiv.className = 'task-title';
    titleDiv.textContent = task.title;
    card.appendChild(titleDiv);

    if (task.desc) {
        var descDiv = document.createElement('div');
        descDiv.className = 'task-description';
        descDiv.textContent = task.desc;
        card.appendChild(descDiv);
    }

    var meta = document.createElement('div');
    meta.className = 'task-meta';

    var catTag = document.createElement('span');
    catTag.className = 'tag tag-' + task.category;
    catTag.textContent = task.category;
    meta.appendChild(catTag);

    if (task.priority === 'critical' || task.priority === 'high') {
        var prioTag = document.createElement('span');
        prioTag.className = 'tag tag-priority-' + task.priority;
        prioTag.textContent = task.priority;
        meta.appendChild(prioTag);
    }

    if (task.notes && task.notes.length) {
        var noteSpan = document.createElement('span');
        noteSpan.className = 'task-note-count';
        noteSpan.textContent = '\uD83D\uDCAC ' + task.notes.length;
        meta.appendChild(noteSpan);
    }

    card.appendChild(meta);
    return card;
}

// ── Quick Add ──
function quickAdd() {
    var input = document.getElementById('quickAddInput');
    var title = input.value.trim();
    if (!title) return;
    tasks.push({
        id: g(), title: title, desc: '', category: 'feature', priority: 'medium',
        status: 'backlog',
        created: new Date().toISOString().split('T')[0], notes: []
    });
    input.value = '';
    saveTasks();
    render();
}

// ── Slide-over Panel ──
function openPanel(taskId) {
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (!task) return;
    activePanelTaskId = taskId;

    document.getElementById('panelTitle').textContent = task.title;
    document.getElementById('panelStatus').value = task.status;
    document.getElementById('panelDesc').value = task.desc || '';
    document.getElementById('panelCategory').value = task.category;
    document.getElementById('panelPriority').value = task.priority;

    var tagsEl = document.getElementById('panelTags');
    tagsEl.textContent = '';

    var catTag = document.createElement('span');
    catTag.className = 'tag tag-' + task.category;
    catTag.textContent = task.category;
    tagsEl.appendChild(catTag);

    if (task.priority === 'critical' || task.priority === 'high') {
        var prioTag = document.createElement('span');
        prioTag.className = 'tag tag-priority-' + task.priority;
        prioTag.textContent = task.priority;
        tagsEl.appendChild(prioTag);
    }

    renderPanelNotes(task);
    document.getElementById('panelOverlay').classList.add('active');
}

function closePanel() {
    document.getElementById('panelOverlay').classList.remove('active');
    activePanelTaskId = null;
}

function updatePanelField(field, value) {
    if (!activePanelTaskId) return;
    var task = tasks.find(function(t) { return t.id === activePanelTaskId; });
    if (!task) return;
    task[field] = value;
    saveTasks();
    render();
    if (field === 'category' || field === 'priority') {
        openPanel(activePanelTaskId);
    }
}

function renderPanelNotes(task) {
    var notes = task.notes || [];
    document.getElementById('panelNoteCount').textContent = notes.length ? '(' + notes.length + ')' : '';
    var notesEl = document.getElementById('panelNotes');
    notesEl.textContent = '';
    notes.forEach(function(n) {
        var item = document.createElement('div');
        item.className = 'note-item';
        var dateSpan = document.createElement('span');
        dateSpan.className = 'note-date';
        dateSpan.textContent = fmtDate(n.date) + ':';
        item.appendChild(dateSpan);
        var textSpan = document.createElement('span');
        textSpan.className = 'note-text';
        textSpan.textContent = n.text;
        item.appendChild(textSpan);
        notesEl.appendChild(item);
    });
    document.getElementById('noteInput').value = '';
}

function fmtDate(d) {
    return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function addNote() {
    if (!activePanelTaskId) return;
    var input = document.getElementById('noteInput');
    var text = input.value.trim();
    if (!text) return;
    var task = tasks.find(function(t) { return t.id === activePanelTaskId; });
    if (!task) return;
    if (!task.notes) task.notes = [];
    task.notes.push({ text: text, date: new Date().toISOString().split('T')[0] });
    saveTasks();
    render();
    renderPanelNotes(task);
}

function deletePanelTask() {
    if (!activePanelTaskId) return;
    if (!confirm('Delete this task?')) return;
    tasks = tasks.filter(function(t) { return t.id !== activePanelTaskId; });
    closePanel();
    saveTasks();
    render();
}

// ── Drag & Drop ──
function handleDragStart(e, taskId) {
    draggedTask = taskId;
    e.target.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.stopPropagation();
}
function handleDragEnd(e) {
    e.target.classList.remove('dragging');
    draggedTask = null;
    document.querySelectorAll('.column-body').forEach(function(c) { c.classList.remove('drag-over'); });
}
function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }
function handleDragEnter(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function handleDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function handleDrop(e, status) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (draggedTask) {
        var task = tasks.find(function(t) { return t.id === draggedTask; });
        if (task) { task.status = status; saveTasks(); render(); }
    }
}

// ── Filters ──
function setFilter(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    render();
}
function searchTasks(query) {
    searchQuery = query;
    render();
}

// ── Modal ──
function openModal(defaultStatus) {
    document.getElementById('modalTitle').textContent = 'Add Task';
    document.getElementById('editTaskId').value = '';
    document.getElementById('taskTitle').value = '';
    document.getElementById('taskDesc').value = '';
    document.getElementById('taskCategory').value = 'feature';
    document.getElementById('taskPriority').value = 'medium';
    document.getElementById('taskStatus').value = defaultStatus || 'backlog';
    document.getElementById('modalOverlay').classList.add('active');
    setTimeout(function() { document.getElementById('taskTitle').focus(); }, 100);
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

function saveTask() {
    var title = document.getElementById('taskTitle').value.trim();
    if (!title) { document.getElementById('taskTitle').focus(); return; }

    var editId = document.getElementById('editTaskId').value;
    var taskData = {
        title: title,
        desc: document.getElementById('taskDesc').value.trim(),
        category: document.getElementById('taskCategory').value,
        priority: document.getElementById('taskPriority').value,
        status: document.getElementById('taskStatus').value
    };

    if (editId) {
        var task = tasks.find(function(t) { return t.id === editId; });
        if (task) Object.assign(task, taskData);
    } else {
        var newTask = Object.assign({ id: g() }, taskData, { created: new Date().toISOString().split('T')[0], notes: [] });
        tasks.push(newTask);
    }

    saveTasks();
    closeModal();
    render();
}

// ── Import/Export ──
function exportData() {
    var blob = new Blob([JSON.stringify(tasks, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'meetmind_tracker_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
}

function importData() { document.getElementById('importFile').click(); }

function handleImport(event) {
    var file = event.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        try {
            var imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) { tasks = imported; saveTasks(); render(); }
        } catch (err) { alert('Invalid JSON file'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

// ── Keyboard Shortcuts ──
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        if (document.getElementById('panelOverlay').classList.contains('active')) closePanel();
        else closeModal();
    }
    if (e.key === 'n' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        document.getElementById('quickAddInput').focus();
    }
});

// ── Init ──
loadTasks();
</script>
</body>
</html>
